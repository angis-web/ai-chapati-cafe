<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chapati Cafe - {% block title %}{% endblock %}</title>
    <link rel="icon" href="https://res.cloudinary.com/dn72tcyi3/image/upload/v1776473087/chapati-logo-normal_hmefzf.png">
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    {% block extra_head %}{% endblock %}
</head>
<body class="min-h-screen flex flex-col bg-[#FFF8DC] text-[#8B4513]">
    <nav class="bg-[#8B4513] text-white px-4 py-4 shadow-md">
        <div class="container mx-auto flex justify-between items-center gap-4">
            <a href="{{ url_for('index') }}" class="flex-shrink-0">
                <img src="https://res.cloudinary.com/dn72tcyi3/image/upload/v1776473087/chapati-logo-normal_hmefzf.png" alt="Chapati Cafe" class="h-10 w-auto">
            </a>
            <div class="flex items-center gap-3">
                <a href="{{ url_for('index') }}" class="px-3 py-2 rounded-md transition duration-200 {% if request.endpoint == 'index' %}border-b-2 border-orange-400{% endif %}">Home</a>
                <a href="{{ url_for('menu') }}" class="px-3 py-2 rounded-md transition duration-200 {% if request.endpoint == 'menu' %}border-b-2 border-orange-400{% endif %}">Menu</a>
                {% if session.get('admin') %}
                    <a href="{{ url_for('admin') }}" class="p-2 rounded-md bg-[#FFF8DC] text-[#8B4513] hover:bg-[#F5DEB3]" title="Dashboard">
                        <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 19v-6a2 2 0 00-2-2H5a2 2 0 00-2 2v6a2 2 0 002 2h2a2 2 0 002-2zm0 0V9a2 2 0 012-2h2a2 2 0 012 2v10m-6 0a2 2 0 002 2h2a2 2 0 002-2m0 0V5a2 2 0 012-2h2a2 2 0 012 2v14a2 2 0 01-2 2h-2a2 2 0 01-2-2z"></path></svg>
                    </a>
                    <a href="{{ url_for('logout') }}" class="p-2 rounded-md bg-[#FFF8DC] text-[#8B4513] hover:bg-[#F5DEB3]" title="Logout">
                        <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1"></path></svg>
                    </a>
                {% else %}
                    <a href="{{ url_for('login') }}" class="p-2 rounded-md bg-[#FFF8DC] text-[#8B4513] hover:bg-[#F5DEB3]" title="Admin">
                        <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z"></path></svg>
                    </a>
                {% endif %}
            </div>
        </div>
    </nav>
    <main class="flex-auto">
        {% block content %}{% endblock %}
    </main>
    <footer class="bg-[#8B4513] text-white py-14 px-4 sm:px-6">
        <div class="container mx-auto grid gap-10 lg:grid-cols-3">
            <div>
                <h3 class="text-2xl font-bold mb-4">Contact Us</h3>
                <p class="mb-2">Phone: <a href="tel:+251967496195" class="text-[#FFF8DC]">+251 967 496 195</a></p>
                <p class="mb-2">Location: Mekelle, Tigray, Ethiopia</p>
                <div class="flex items-center gap-3 mt-4">
                    <a href="https://www.tiktok.com/@chapati_bbq" target="_blank" rel="noopener noreferrer" class="rounded-full bg-[#FFF8DC]/15 p-3 transition hover:bg-[#FFF8DC]/30" title="TikTok">
                        <svg class="w-3 h-3" viewBox="0 0 24 24" fill="none"><path d="M12.525.02c1.31-.02 2.61-.01 3.91-.02.08 1.53.63 3.09 1.75 4.17 1.12 1.11 2.7 1.62 4.24 1.79v4.03c-1.44-.05-2.89-.35-4.2-.97-.57-.26-1.1-.59-1.62-.93-.01 2.92.01 5.84-.02 8.75-.08 1.4-.54 2.79-1.35 3.94-1.31 1.92-3.58 3.17-5.91 3.21-1.43.08-2.86-.31-4.08-1.03-2.02-1.19-3.44-3.37-3.65-5.71-.02-.5-.03-1-.01-1.49.18-1.9 1.12-3.72 2.58-4.96 1.66-1.44 3.98-2.13 6.15-1.72.02 1.48-.04 2.96-.04 4.44-.99-.32-2.15-.23-3.02.37-.63.41-1.11 1.04-1.36 1.75-.21.51-.15 1.07-.14 1.61.24 1.64 1.82 3.02 3.5 2.87 1.12-.01 2.19-.66 2.77-1.61.19-.33.4-.67.41-1.06.1-1.79.06-3.57.07-5.36.01-4.03-.01-8.05.02-12.07z" fill="#000000"/></svg>
                    </a>
                    <a href="https://www.instagram.com/chapati_bbq/" target="_blank" rel="noopener noreferrer" class="rounded-full bg-[#FFF8DC]/15 p-3 transition hover:bg-[#FFF8DC]/30" title="Instagram">
                        <svg class="w-3 h-3" viewBox="0 0 24 24" fill="#E4405F"><path d="M7.8 2h8.4C19.4 2 22 4.6 22 7.8v8.4a5.8 5.8 0 0 1-5.8 5.8H7.8C4.6 22 2 19.4 2 16.2V7.8A5.8 5.8 0 0 1 7.8 2m-.2 2A3.6 3.6 0 0 0 4 7.6v8.8C4 18.39 5.61 20 7.6 20h8.8a3.6 3.6 0 0 0 3.6-3.6V7.6C20 5.61 18.39 4 16.4 4H7.6m9.65 1.5a1.25 1.25 0 0 1 1.25 1.25A1.25 1.25 0 0 1 17.25 8 1.25 1.25 0 0 1 16 6.75a1.25 1.25 0 0 1 1.25-1.25M12 7a5 5 0 0 1 5 5 5 5 0 0 1-5 5 5 5 0 0 1-5-5 5 5 0 0 1 5-5m0 2a3 3 0 0 0-3 3 3 3 0 0 0 3 3 3 3 0 0 0 3-3 3 3 0 0 0-3-3z"/></svg>
                    </a>
                    <a href="https://x.com/B3490Bbq" target="_blank" rel="noopener noreferrer" class="rounded-full bg-[#FFF8DC]/15 p-3 transition hover:bg-[#FFF8DC]/30" title="X">
                        <svg class="w-3 h-3" fill="#000000" viewBox="0 0 24 24"><path d="M18.244 2.25h3.308l-7.227 8.26 8.502 11.24H16.17l-5.214-6.817L4.99 21.75H1.68l7.73-8.835L1.254 2.25H8.08l4.713 6.231zm-1.161 17.52h1.833L7.084 4.126H5.117z"/></svg>
                    </a>
                </div>
            </div>
            <div class="lg:col-span-2">
                <h3 class="text-2xl font-bold mb-4">Find Us On the Map</h3>
                <div class="overflow-hidden rounded-3xl border border-[#D2691E]/40 bg-white">
                    <iframe class="w-full h-64" loading="lazy" allowfullscreen="" style="border:0;" referrerpolicy="no-referrer-when-downgrade"
                        src="https://www.google.com/maps/embed?pb=!1m18!1m12!1m3!1d3879.8299774084344!2d39.47160131744384!3d13.484572199999995!2m3!1f0!2f0!3f0!3m2!1i1024!2i768!4f13.1!3m3!1m2!1s0x166afd0064ba3b7d%3A0xbf80f7a7974fc857!2zQ2hhcGF0aSBMb3VuZ2Ug4Ym74Y2T4YmyIOGIi-GLjeGKleGMhSDZhdi32LnZhSDYtNin2KjYp9iq2Yk!5e0!3m2!1sen!2set!4v1776023025993!5m2!1sen!2set"></iframe>
                </div>
            </div>
        </div>
    </footer>
    {% block scripts %}{% endblock %}
</body>
</html>
