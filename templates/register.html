<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chapati Cafe - Register</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body class="bg-[#FFF8DC] text-[#8B4513]">
    <!-- Navigation -->
    <nav class="bg-[#8B4513] text-white px-4 py-4 shadow-md">
        <div class="container mx-auto flex flex-row flex-wrap justify-between items-center gap-4">
            <a href="{{ url_for('index') }}" class="text-2xl font-bold tracking-tight flex-shrink-0">Chapati Cafe</a>
            <div class="flex flex-row flex-wrap items-center gap-3 justify-end">
                <a href="{{ url_for('index') }}" class="px-3 py-2 rounded-md transition duration-200">Home</a>
                <a href="{{ url_for('menu') }}" class="px-3 py-2 rounded-md transition duration-200">Menu</a>
                <a href="{{ url_for('login') }}" class="p-2 rounded-md bg-[#FFF8DC] text-[#8B4513] hover:bg-[#F5DEB3]" title="Login">
                    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z"></path></svg>
                </a>
            </div>
        </div>
    </nav>

    <!-- Register Form -->
    <section class="py-20">
        <div class="container mx-auto max-w-md">
            <div class="bg-white p-8 rounded-3xl shadow-xl">
                <h2 class="text-3xl font-bold mb-6 text-center">Create Account</h2>
                {% with messages = get_flashed_messages() %}
                    {% if messages %}
                        <div class="mb-4 text-red-500 text-center">
                            {% for message in messages %}
                                {{ message }}
                            {% endfor %}
                        </div>
                    {% endif %}
                {% endwith %}
                <form action="{{ url_for('register') }}" method="post">
                    <div class="mb-4">
                        <label for="username" class="block text-sm font-medium mb-2">Username</label>
                        <input type="text" id="username" name="username" required class="w-full border border-[#D2691E]/30 p-3 rounded-lg focus:ring-2 focus:ring-[#D2691E] focus:border-transparent">
                    </div>
                    <div class="mb-4">
                        <label for="email" class="block text-sm font-medium mb-2">Email</label>
                        <input type="email" id="email" name="email" required class="w-full border border-[#D2691E]/30 p-3 rounded-lg focus:ring-2 focus:ring-[#D2691E] focus:border-transparent">
                    </div>
                    <div class="mb-4">
                        <label for="password" class="block text-sm font-medium mb-2">Password</label>
                        <input type="password" id="password" name="password" required class="w-full border border-[#D2691E]/30 p-3 rounded-lg focus:ring-2 focus:ring-[#D2691E] focus:border-transparent">
                    </div>
                    <div class="mb-4">
                        <label for="full_name" class="block text-sm font-medium mb-2">Full Name</label>
                        <input type="text" id="full_name" name="full_name" required class="w-full border border-[#D2691E]/30 p-3 rounded-lg focus:ring-2 focus:ring-[#D2691E] focus:border-transparent">
                    </div>
                    <div class="mb-4">
                        <label for="phone" class="block text-sm font-medium mb-2">Phone</label>
                        <input type="tel" id="phone" name="phone" required class="w-full border border-[#D2691E]/30 p-3 rounded-lg focus:ring-2 focus:ring-[#D2691E] focus:border-transparent">
                    </div>
                    <div class="mb-6">
                        <label for="address" class="block text-sm font-medium mb-2">Address</label>
                        <textarea id="address" name="address" required rows="3" class="w-full border border-[#D2691E]/30 p-3 rounded-lg focus:ring-2 focus:ring-[#D2691E] focus:border-transparent"></textarea>
                    </div>
                    <button type="submit" class="w-full bg-[#D2691E] text-white py-3 rounded-lg font-semibold hover:bg-[#A0522D] transition duration-200">Create Account</button>
                </form>
                <div class="mt-6 text-center">
                    <p class="text-sm text-[#5f3c1b]">Already have an account? <a href="{{ url_for('login') }}" class="text-[#D2691E] font-semibold hover:underline">Login here</a></p>
                </div>
            </div>
        </div>
    </section>

    <!-- Footer -->
    <footer class="bg-[#8B4513] text-white py-14 px-4 sm:px-6">
        <div class="container mx-auto text-center">
            <p>&copy; 2026 Chapati Cafe. All rights reserved.</p>
        </div>
    </footer>
</body>
</html>
