<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chapati Cafe - Admin</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body class="bg-[#FFF8DC] text-[#8B4513]">
    <!-- Navigation -->
    <nav class="bg-[#8B4513] text-white px-4 py-4 shadow-md">
        <div class="container mx-auto flex flex-row flex-wrap justify-between items-center gap-4">
            <a href="{{ url_for('index') }}" class="text-2xl font-bold tracking-tight flex-shrink-0">Chapati Cafe</a>
            <div class="flex flex-row flex-wrap items-center gap-3 justify-end">
                <a href="{{ url_for('index') }}" class="px-3 py-2 rounded-md transition duration-200 {% if request.endpoint == 'index' %}border-b-2 border-orange-400{% endif %}">Home</a>
                <a href="{{ url_for('menu') }}" class="px-3 py-2 rounded-md transition duration-200 {% if request.endpoint == 'menu' %}border-b-2 border-orange-400{% endif %}">Menu</a>
                <a href="{{ url_for('logout') }}" class="p-2 rounded-md bg-[#FFF8DC] text-[#8B4513] hover:bg-[#F5DEB3]" title="Logout">
                    <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1"></path></svg>
                </a>
            </div>
        </div>
    </nav>

    <!-- Add Item Form -->
    <section class="py-8">
        <div class="container mx-auto">
            <h2 class="text-3xl font-bold mb-4">Add New Item</h2>
            <form action="{{ url_for('add_item') }}" method="post" class="bg-white p-6 rounded-lg shadow-md">
                <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                    <input type="text" name="name" placeholder="Name" required class="border p-2 rounded">
                    <input type="number" step="0.01" name="price" placeholder="Price" required class="border p-2 rounded">
                    <input type="text" name="description" placeholder="Description" required class="border p-2 rounded md:col-span-2">
                    <input type="url" name="image_url" placeholder="Image URL" required class="border p-2 rounded">
                    <select name="category" required class="border p-2 rounded">
                        <option value="Food">Food</option>
                        <option value="Drink">Drink</option>
                        <option value="Sweets">Sweets</option>
                    </select>
                    <div class="flex items-center">
                        <input type="checkbox" id="available" name="available" value="1" checked class="mr-2">
                        <label for="available">Available</label>
                    </div>
                </div>
                <button type="submit" class="mt-4 bg-[#D2691E] text-white px-4 py-2 rounded">Add Item</button>
            </form>
        </div>
    </section>

    <!-- Items Table -->
    <section class="py-8">
        <div class="container mx-auto">
            <h2 class="text-3xl font-bold mb-4">Manage Items</h2>
            <div class="overflow-x-auto">
                <table class="min-w-full bg-white rounded-lg shadow-md">
                    <thead>
                        <tr class="bg-[#8B4513] text-white">
                            <th class="py-2 px-4">ID</th>
                            <th class="py-2 px-4">Name</th>
                            <th class="py-2 px-4">Description</th>
                            <th class="py-2 px-4">Price</th>
                            <th class="py-2 px-4">Image URL</th>
                            <th class="py-2 px-4">Category</th>
                            <th class="py-2 px-4">Available</th>
                            <th class="py-2 px-4">Actions</th>
                        </tr>
                    </thead>
                    <tbody>
                        {% for item in items %}
                        <tr class="border-b">
                            <td class="py-2 px-4">{{ item.id }}</td>
                            <form action="{{ url_for('update_item', id=item.id) }}" method="post" class="contents">
                                <td class="py-2 px-4"><input type="text" name="name" value="{{ item.name }}" class="border p-1 w-full"></td>
                                <td class="py-2 px-4"><input type="text" name="description" value="{{ item.description }}" class="border p-1 w-full"></td>
                                <td class="py-2 px-4"><input type="number" step="0.01" name="price" value="{{ item.price }}" class="border p-1 w-full"></td>
                                <td class="py-2 px-4"><input type="url" name="image_url" value="{{ item.image_url }}" class="border p-1 w-full"></td>
                                <td class="py-2 px-4">
                                    <select name="category" class="border p-1 w-full">
                                        <option value="Food" {% if item.category == 'Food' %}selected{% endif %}>Food</option>
                                        <option value="Drink" {% if item.category == 'Drink' %}selected{% endif %}>Drink</option>
                                        <option value="Sweets" {% if item.category == 'Sweets' %}selected{% endif %}>Sweets</option>
                                    </select>
                                </td>
                                <td class="py-2 px-4">
                                    <input type="checkbox" name="available" value="1" {% if item.available %}checked{% endif %} class="w-4 h-4">
                                </td>
                                <td class="py-2 px-4">
                                    <button type="submit" class="bg-[#D2691E] text-white px-2 py-1 rounded mr-2">Update</button>
                                    <a href="{{ url_for('delete_item', id=item.id) }}" class="bg-red-500 text-white px-2 py-1 rounded" onclick="return confirm('Are you sure?')">Delete</a>
                                </td>
                            </form>
                        </tr>
                        {% endfor %}
                    </tbody>
                </table>
            </div>
        </div>
    </section>

    <!-- Footer -->
    <footer class="bg-[#8B4513] text-white py-8">
        <div class="container mx-auto text-center">
            <p>&copy; 2023 Chapati Cafe. All rights reserved.</p>
        </div>
    </footer>
</body>
</html>
