<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chapati Cafe - Login</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body class="bg-[#FFF8DC] text-[#8B4513]">
    <!-- Navigation -->
    <nav class="bg-[#8B4513] text-white p-4">
        <div class="container mx-auto flex justify-between items-center">
            <div class="flex space-x-4">
                <a href="{{ url_for('index') }}" class="px-3 py-2 rounded {% if request.endpoint == 'index' %}active{% endif %}">Home</a>
                <a href="{{ url_for('menu') }}" class="px-3 py-2 rounded {% if request.endpoint == 'menu' %}active{% endif %}">Menu</a>
            </div>
            <div>
                <a href="{{ url_for('login') }}" class="text-white"><svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z"></path></svg></a>
            </div>
        </div>
    </nav>

    <!-- Login Form -->
    <section class="py-20">
        <div class="container mx-auto max-w-md">
            <div class="bg-white p-8 rounded-lg shadow-md">
                <h2 class="text-3xl font-bold mb-4 text-center">Admin Login</h2>
                {% with messages = get_flashed_messages() %}
                    {% if messages %}
                        <div class="mb-4 text-red-500">
                            {% for message in messages %}
                                {{ message }}
                            {% endfor %}
                        </div>
                    {% endif %}
                {% endwith %}
                <form action="{{ url_for('login') }}" method="post">
                    <div class="mb-4">
                        <label for="username" class="block text-sm font-medium mb-2">Username</label>
                        <input type="text" id="username" name="username" required class="w-full border p-2 rounded">
                    </div>
                    <div class="mb-4">
                        <label for="password" class="block text-sm font-medium mb-2">Password</label>
                        <input type="password" id="password" name="password" required class="w-full border p-2 rounded">
                    </div>
                    <button type="submit" class="w-full bg-[#D2691E] text-white py-2 rounded font-semibold">Login</button>
                </form>
            </div>
        </div>
    </section>

    <!-- Footer -->
    <footer class="bg-[#8B4513] text-white py-8">
        <div class="container mx-auto text-center">
            <p>&copy; 2023 Chapati Cafe. All rights reserved.</p>
        </div>
    </footer>
</body>
</html>
