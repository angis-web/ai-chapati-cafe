{% extends 'base.html' %}

{% block title %}Login{% endblock %}

{% block content %}
    <!-- Login Form -->
    <section class="py-20">
        <div class="container mx-auto max-w-md">
            <div class="bg-white p-8 rounded-lg shadow-md">
                <h2 class="text-3xl font-bold mb-4 text-center">Admin Login</h2>
                {% with messages = get_flashed_messages() %}
                    {% if messages %}
                        <div class="mb-4 text-red-500">
                            {% for message in messages %}
                                {{ message }}
                            {% endfor %}
                        </div>
                    {% endif %}
                {% endwith %}
                <form action="{{ url_for('login') }}" method="post">
                    <div class="mb-4">
                        <label for="username" class="block text-sm font-medium mb-2">Username</label>
                        <input type="text" id="username" name="username" required class="w-full border p-2 rounded">
                    </div>
                    <div class="mb-4">
                        <label for="password" class="block text-sm font-medium mb-2">Password</label>
                        <input type="password" id="password" name="password" required class="w-full border p-2 rounded">
                    </div>
                    <button type="submit" class="w-full bg-[#D2691E] text-white py-2 rounded font-semibold">Login</button>
                </form>
            </div>
        </div>
    </section>

{% endblock %}
