<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chapati Cafe - Login</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body class="bg-[#FFF8DC] text-[#8B4513]">
    <!-- Navigation -->
    <nav class="bg-[#8B4513] text-white px-4 py-4 shadow-md">
        <div class="container mx-auto flex flex-row flex-wrap justify-between items-center gap-4">
            <a href="{{ url_for('index') }}" class="text-2xl font-bold tracking-tight flex-shrink-0">Chapati Cafe</a>
            <div class="flex flex-row flex-wrap items-center gap-3 justify-end">
                <a href="{{ url_for('index') }}" class="px-3 py-2 rounded-md transition duration-200">Home</a>
                <a href="{{ url_for('menu') }}" class="px-3 py-2 rounded-md transition duration-200">Menu</a>
                <a href="{{ url_for('login') }}" class="p-2 rounded-md bg-[#FFF8DC] text-[#8B4513] hover:bg-[#F5DEB3]" title="Admin">
                    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10.325 4.317c.426-1.756 2.924-1.756 3.35 0a1.724 1.724 0 002.573 1.066c1.543-.94 3.31.826 2.37 2.37a1.724 1.724 0 001.065 2.572c1.756.426 1.756 2.924 0 3.35a1.724 1.724 0 00-1.066 2.573c.94 1.543-.826 3.31-2.37 2.37a1.724 1.724 0 00-2.572 1.065c-.426 1.756-2.924 1.756-3.35 0a1.724 1.724 0 00-2.573-1.066c-1.543.94-3.31-.826-2.37-2.37a1.724 1.724 0 00-1.065-2.572c-1.756-.426-1.756-2.924 0-3.35a1.724 1.724 0 001.066-2.573c-.94-1.543.826-3.31 2.37-2.37.996.608 2.296.07 2.572-1.065z"></path><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"></path></svg>
                </a>
            </div>
        </div>
    </nav>

    <!-- Login Form -->
    <section class="py-20">
        <div class="container mx-auto max-w-md">
            <div class="bg-white p-8 rounded-lg shadow-md">
                <h2 class="text-3xl font-bold mb-4 text-center">Admin Login</h2>
                {% with messages = get_flashed_messages() %}
                    {% if messages %}
                        <div class="mb-4 text-red-500">
                            {% for message in messages %}
                                {{ message }}
                            {% endfor %}
                        </div>
                    {% endif %}
                {% endwith %}
                <form action="{{ url_for('login') }}" method="post">
                    <div class="mb-4">
                        <label for="username" class="block text-sm font-medium mb-2">Username</label>
                        <input type="text" id="username" name="username" required class="w-full border p-2 rounded">
                    </div>
                    <div class="mb-4">
                        <label for="password" class="block text-sm font-medium mb-2">Password</label>
                        <input type="password" id="password" name="password" required class="w-full border p-2 rounded">
                    </div>
                    <button type="submit" class="w-full bg-[#D2691E] text-white py-2 rounded font-semibold">Login</button>
                </form>
            </div>
        </div>
    </section>

    <!-- Footer -->
    <footer class="bg-[#8B4513] text-white py-8">
        <div class="container mx-auto text-center">
            <p>&copy; 2023 Chapati Cafe. All rights reserved.</p>
        </div>
    </footer>
</body>
</html>
